# Sonatum Music - Production nginx config
# Copy to /etc/nginx/sites-available/sonatum-music and symlink into sites-enabled.
# Backend container :3011 (host-mapped), Frontend container :3010 (host-mapped).

# Redirect non-canonical hosts to apex
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://sonatum-music.ru$request_uri;
}

# HTTP -> HTTPS for the canonical hostnames
server {
    listen 80;
    listen [::]:80;
    server_name sonatum-music.ru www.sonatum-music.ru;
    return 301 https://sonatum-music.ru$request_uri;
}

# www -> apex over HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.sonatum-music.ru;
    ssl_certificate /etc/letsencrypt/live/sonatum-music.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sonatum-music.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://sonatum-music.ru$request_uri;
}

upstream sonatum_frontend { server 127.0.0.1:3010; keepalive 32; }
upstream sonatum_backend  { server 127.0.0.1:3011; keepalive 32; }

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sonatum-music.ru;

    ssl_certificate /etc/letsencrypt/live/sonatum-music.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sonatum-music.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/sonatum-access.log;
    error_log  /var/log/nginx/sonatum-error.log;

    client_max_body_size 500M;
    client_body_timeout 600s;
    client_header_timeout 600s;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml
        application/xml+rss application/wasm
        image/svg+xml font/woff2;

    # Static media — served directly by nginx for max speed
    location /audio/ {
        alias /opt/sonatum/data/audio/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }
    location /images/ {
        alias /opt/sonatum/data/images/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }
    location /sheets/pdf/ {
        alias /opt/sonatum/data/sheets/pdf/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }
    location /uploads/ {
        alias /opt/sonatum/data/uploads/;
        expires 1d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # Backend API
    location /api/ {
        proxy_pass http://sonatum_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;

        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Next.js static & build assets — long cache
    location /_next/static/ {
        proxy_pass http://sonatum_frontend;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Frontend (catch-all) — must be last
    location / {
        proxy_pass http://sonatum_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
